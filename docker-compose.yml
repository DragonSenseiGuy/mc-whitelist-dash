services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik

  mc-admin:
    build: .
    container_name: mc-admin-dashboard
    restart: unless-stopped
    environment:
      - MC_SSH_HOST=${MC_SSH_HOST}
      - MC_SSH_USER=${MC_SSH_USER:-server}
      - MC_SSH_KEY_PATH=/etc/mc-dashboard/id_ed25519
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ${SSH_KEY_PATH:-~/.ssh/id_ed25519}:/etc/mc-dashboard/id_ed25519:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mc-admin.rule=Host(`${DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.mc-admin.entrypoints=websecure"
      - "traefik.http.routers.mc-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.mc-admin.loadbalancer.server.port=3000"
    networks:
      - traefik

volumes:
  letsencrypt:

networks:
  traefik:
