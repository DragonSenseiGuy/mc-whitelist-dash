services:
  mc-admin:
    build: .
    container_name: mc-admin-dashboard
    restart: unless-stopped
    environment:
      - MC_SSH_HOST=${MC_SSH_HOST}
      - MC_SSH_USER=${MC_SSH_USER:-server}
      - MC_SSH_KEY_PATH=/etc/mc-dashboard/id_ed25519
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ${SSH_KEY_PATH:-~/.ssh/id_ed25519}:/etc/mc-dashboard/id_ed25519:ro
